<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }} — {{ site.domain }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", system-ui, sans-serif;
            background: #0a0a0f;
            color: #c8c8d4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        .container { max-width: 640px; }

        .brand {
            font-size: 3.5rem;
            font-weight: 200;
            letter-spacing: 0.15em;
            color: #f0f0f0;
            margin-bottom: 0.25rem;
        }

        .brand .dot { color: #7d8ca3; }

        .domain {
            font-size: 1.05rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: #5a6377;
            margin-bottom: 3rem;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: #3a3d4a;
            margin: 0 auto 3rem;
        }

        .message {
            font-size: 1.15rem;
            font-weight: 300;
            line-height: 2;
            color: #8a92a6;
        }

        .footer {
            position: fixed;
            bottom: 2rem;
            font-size: 0.8rem;
            font-weight: 300;
            color: #4a505e;
        }

        .footer a {
            color: #5a6377;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover { color: #8a92a6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">{{ page.brand_html }}</div>
        <div class="domain">{{ site.domain }}</div>
        <div class="divider"></div>
        <div class="message">
            {{ site.description }}<br>
            {{ site.tagline }}
        </div>
    </div>

    <div class="footer">
        <a href="{{ site.footer_link }}" target="_blank" rel="noopener">{{ site.footer_text }}</a>
    </div>
</body>
</html>
